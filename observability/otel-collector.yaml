# Receives telemetry from the microservices over OTLP.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# Applies batch processing before exporting telemetry.
processors:
  batch:

exporters:
  # Sends traces to Jaeger through OTLP.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Exposes metrics so Prometheus can scrape them.
  prometheus:
    endpoint: "0.0.0.0:8889"
  debug:
    verbosity: basic

# Defines the telemetry pipelines used by the collector.
service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlp/jaeger, debug]
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheus, debug]
