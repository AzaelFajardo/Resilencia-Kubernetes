receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Envia trazas a Jaeger via OTLP 
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Expone metricas para que Prometheus las obtenga
  prometheus:
    endpoint: "0.0.0.0:8889"
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlp/jaeger, debug]
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheus, debug]